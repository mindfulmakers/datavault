[project]
name = "datavault-type-location"
version = "0.1.0"
description = "Normalized location data type plugin for Data Vault"
authors = [
  { name = "Gabriel Montague", email = "montaguegabe@users.noreply.github.com" },
]
requires-python = ">=3.12"
dependencies = [
  "datavault-plugin-sdk",
]

[project.entry-points."datavault.data_types"]
location = "datavault_type_location:get_plugin"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/datavault_type_location"]
