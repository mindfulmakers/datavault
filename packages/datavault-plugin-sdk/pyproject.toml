[project]
name = "datavault-plugin-sdk"
version = "0.1.0"
description = "Plugin SDK contracts for Data Vault packages"
authors = [
  { name = "Gabriel Montague", email = "montaguegabe@users.noreply.github.com" },
]
requires-python = ">=3.12"
dependencies = [
  "pydantic>=2.11.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/datavault_plugin_sdk"]
