[project]
name = "datavault-core"
version = "0.1.0"
description = "FastAPI server for the local-first Data Vault Core"
authors = [
  { name = "Gabriel Montague", email = "montaguegabe@users.noreply.github.com" },
]
requires-python = ">=3.12"
dependencies = [
  "datavault-plugin-sdk",
  "datavault-provider-garmin-location",
  "datavault-provider-ios-location",
  "datavault-provider-messages-demo",
  "datavault-type-location",
  "datavault-type-messages",
  "fastapi>=0.116.1",
  "httpx>=0.28.1",
  "langchain>=0.3.25",
  "langchain-core>=0.3.66",
  "pydantic>=2.11.3",
  "uvicorn>=0.35.0",
]

[project.scripts]
datavault-core = "datavault_core.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/datavault_core"]
